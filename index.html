<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Management Web App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        
        /* Admin Panel Styling */
        .admin-panel {
            display: none; 
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border: 2px dashed #27ae60;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-submit {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #219653;
        }
        .btn-logout {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }

        /* User Panel Styling */
        .user-panel {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .book-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .book-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            position: relative;
        }
        .book-card h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #2980b9;
        }
        .book-card p {
            margin: 0 0 5px 0;
            color: #7f8c8d;
            font-size: 14px;
        }
        .file-type-badge {
            display: inline-block;
            font-size: 11px;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .btn-download {
            display: inline-block;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 14px;
            width: 80%;
        }
        .btn-download:hover {
            background-color: #2980b9;
        }
        
        .btn-delete {
            display: none;
            position: absolute;
            top: 5px;
            right: 5px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 12px;
        }
        .no-books {
            text-align: center;
            color: #95a5a6;
            grid-column: 1 / -1;
        }
        
        .admin-mode .btn-delete {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Book Management Web App</h1>
    <p style="text-align: center; font-size: 12px; color: #aaa;">[Admin Panel: Ctrl + Shift + A]</p>

    <div class="admin-panel" id="adminPanel">
        <button class="btn-logout" onclick="logoutAdmin()">Logout Admin</button>
        <h2>Admin Panel (Add New Book/File)</h2>
        <form id="bookForm">
            <div class="form-group">
                <label for="bookTitle">বই বা ফাইলের নাম:</label>
                <input type="text" id="bookTitle" placeholder="উদা: Javascript Basics" required>
            </div>
            <div class="form-group">
                <label for="bookAuthor">লেখকের নাম / বিবরণ:</label>
                <input type="text" id="bookAuthor" placeholder="উদা: হুমায়ূন আহমেদ" required>
            </div>
            
            <div class="form-group">
                <label for="uploadType">যুক্ত করার মাধ্যম সিলেক্ট করুন:</label>
                <select id="uploadType" onchange="toggleInputFields()">
                    <option value="link">Direct URL / Link</option>
                    <option value="file">Upload File (PDF, Image, etc.)</option>
                </select>
            </div>

            <div class="form-group" id="linkField">
                <label for="fileUrl">ফাইল বা ড্রাইভ লিংক (URL):</label>
                <input type="url" id="fileUrl" placeholder="https://drive.google.com/...">
            </div>

            <div class="form-group" id="fileField" style="display: none;">
                <label for="fileInput">কম্পিউটার/মোবাইল থেকে ফাইল সিলেক্ট করুন:</label>
                <input type="file" id="fileInput">
            </div>

            <button type="submit" class="btn-submit">Add to List</button>
        </form>
    </div>

    <div class="user-panel">
        <h2> (Available Book List)</h2>
        <div class="book-list" id="bookContainer">
            </div>
    </div>
</div>

<script>
    const bookForm = document.getElementById('bookForm');
    const bookContainer = document.getElementById('bookContainer');
    const adminPanel = document.getElementById('adminPanel');
    const uploadType = document.getElementById('uploadType');
    const linkField = document.getElementById('linkField');
    const fileField = document.getElementById('fileField');

    let books = JSON.parse(localStorage.getItem('myBooks')) || [];
    let isAdmin = false;

    // ড্রপডাউন চেঞ্জ অনুযায়ী ইনপুট ফিল্ড পরিবর্তন করার ফাংশন
    function toggleInputFields() {
        if (uploadType.value === 'link') {
            linkField.style.display = 'block';
            fileField.style.display = 'none';
            document.getElementById('fileInput').value = ''; // ক্লিয়ার ফাইল
        } else {
            linkField.style.display = 'none';
            fileField.style.display = 'block';
            document.getElementById('fileUrl').value = ''; // ক্লিয়ার লিংক
        }
    }

    // বইয়ের লিস্ট দেখানোর ফাংশন
    function displayBooks() {
        bookContainer.innerHTML = ''; 

        if (books.length === 0) {
            bookContainer.innerHTML = '<p class="no-books">কোনো বই বা ফাইল যুক্ত করা হয়নি।</p>';
            return;
        }

        books.forEach((book, index) => {
            const bookCard = document.createElement('div');
            bookCard.className = `book-card ${isAdmin ? 'admin-mode' : ''}`;
            
            // ফাইলের টাইপ অনুযায়ী ব্যাজ নির্ধারণ
            const typeBadge = book.type === 'file' ? '📁 Local File' : '🔗 Web Link';

            // ডাউনলোড লিংক তৈরি (ফাইল হলে ডিরেক্ট সোর্স ডাউনলোড হবে)
            const downloadAttribute = book.type === 'file' ? `download="${book.title}"` : '';

            bookCard.innerHTML = `
                <button class="btn-delete" onclick="deleteBook(${index})">X</button>
                <h3>${book.title}</h3>
                <p>লেখক: ${book.author}</p>
                <span class="file-type-badge">${typeBadge}</span><br>
                <a href="${book.url}" ${downloadAttribute} target="_blank" class="btn-download">View / Download</a>
            `;
            bookContainer.appendChild(bookCard);
        });
    }

    // শর্টকাট ডিটেক্ট করা (Ctrl + Shift + A)
    window.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.shiftKey && (e.key === 'A' || e.key === 'a')) {
            e.preventDefault();
            const adminId = prompt("Enter Admin ID:");
            if (adminId === "236533") {
                const adminPass = prompt("Enter Admin Password:");
                if (adminPass === "fahad236533") {
                    alert("অ্যাডমিন লগইন সফল হয়েছে!");
                    isAdmin = true;
                    adminPanel.style.display = 'block';
                    displayBooks();
                } else {
                    alert("ভুল পাসওয়ার্ড!");
                }
            } else if (adminId !== null) {
                alert("ভুল অ্যাডমিন আইডি!");
            }
        }
    });

    // ফর্ম সাবমিট এবং ডেটা প্রসেসিং
    bookForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const title = document.getElementById('bookTitle').value;
        const author = document.getElementById('bookAuthor').value;
        const type = uploadType.value;

        if (type === 'link') {
            const url = document.getElementById('fileUrl').value;
            if(!url) return alert("দয়া করে লিংকটি প্রদান করুন।");
            
            saveBook({ title, author, type, url });
        } else {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert("দয়া করে একটি ফাইল সিলেক্ট করুন।");
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            
            // ফাইলটিকে Base64 টেক্সটে রূপান্তর করা
            reader.onload = function(event) {
                const url = event.target.result; // এটিই ফাইলের ডেটা ইউআরএল
                saveBook({ title, author, type, url });
            };
            reader.readAsDataURL(file);
        }
    });

    // ডেটা সেভ করার কমন ফাংশন
    function saveBook(bookObj) {
        try {
            books.push(bookObj);
            localStorage.setItem('myBooks', JSON.stringify(books));
            bookForm.reset();
            toggleInputFields(); // ফিল্ড রিসেট
            displayBooks();
        } catch (error) {
            // LocalStorage এর মেমোরি লিমিট (সাধারণত 5MB) পার হলে সতর্কবার্তা দেবে
            alert("ফাইলটি অতিরিক্ত বড় হওয়ার কারণে সেভ করা যাচ্ছে না! দয়া করে ড্রাইভ লিংক অপশন ব্যবহার করুন।");
            books.pop();
        }
    }

    // বই ডিলিট করা
    function deleteBook(index) {
        if(confirm("আপনি কি এটি তালিকা থেকে বাদ দিতে চান?")) {
            books.splice(index, 1);
            localStorage.setItem('myBooks', JSON.stringify(books));
            displayBooks();
        }
    }

    // অ্যাডমিন লগআউট
    function logoutAdmin() {
        isAdmin = false;
        adminPanel.style.display = 'none';
        displayBooks();
        alert("অ্যাডমিন লগআউট করা হয়েছে।");
    }

    displayBooks();
</script>

</body>
</html>

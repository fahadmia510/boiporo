<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Management Web App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
            /* টেক্সট সিলেক্ট বা কপি করা বন্ধ করার জন্য */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        
        /* Admin Panel Styling */
        .admin-panel {
            display: none; 
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border: 2px dashed #27ae60;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-submit {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #219653;
        }
        .btn-logout {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }

        /* User Panel Styling */
        .user-panel {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .book-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .book-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            position: relative;
        }
        .book-card h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #2980b9;
        }
        .book-card p {
            margin: 0 0 5px 0;
            color: #7f8c8d;
            font-size: 14px;
        }
        .file-type-badge {
            display: inline-block;
            font-size: 11px;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .view-count-badge {
            display: none;
            font-size: 12px;
            background: #fff3cd;
            color: #856404;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-weight: bold;
            border: 1px solid #ffeeba;
        }
        .admin-mode .view-count-badge {
            display: inline-block;
        }
        .btn-view {
            display: inline-block;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 14px;
            width: 80%;
            cursor: pointer;
        }
        .btn-view:hover {
            background-color: #2980b9;
        }
        
        .btn-delete {
            display: none;
            position: absolute;
            top: 5px;
            right: 5px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 12px;
        }
        .no-books {
            text-align: center;
            color: #95a5a6;
            grid-column: 1 / -1;
        }
        
        .admin-mode .btn-delete {
            display: block;
        }

        /* Read-Only Viewer Modal */
        .viewer-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
        }
        .viewer-content {
            position: relative;
            width: 90%;
            height: 85%;
            margin: 4% auto;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
        }
        .viewer-header {
            background: #2c3e50;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .viewer-header h3 {
            margin: 0;
            font-size: 16px;
        }
        .btn-close-viewer {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .viewer-body {
            width: 100%;
            height: calc(100% - 45px);
        }
        .viewer-body iframe, .viewer-body embed {
            width: 100%;
            height: 100%;
            border: none;
        }
        .viewer-image {
            max-width: 100%;
            max-height: 100%;
            display: block;
            margin: auto;
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Book Management Web App</h1>

    <div class="admin-panel" id="adminPanel">
        <button class="btn-logout" onclick="logoutAdmin()">Logout Admin</button>
        <h2>Admin Panel (Add New Book/File)</h2>
        <form id="bookForm">
            <div class="form-group">
                <label for="bookTitle">বই বা ফাইলের নাম:</label>
                <input type="text" id="bookTitle" placeholder="উদা: Javascript Basics" required>
            </div>
            <div class="form-group">
                <label for="bookAuthor">লেখকের নাম / বিবরণ:</label>
                <input type="text" id="bookAuthor" placeholder="উদা: হুমায়ূন আহমেদ" required>
            </div>
            
            <div class="form-group">
                <label for="uploadType">যুক্ত করার মাধ্যম সিলেক্ট করুন:</label>
                <select id="uploadType" onchange="toggleInputFields()">
                    <option value="link">Direct URL / Link</option>
                    <option value="file">Upload File (PDF, Image, etc.)</option>
                </select>
            </div>

            <div class="form-group" id="linkField">
                <label for="fileUrl">ফাইল বা ড্রাইভ লিংক (URL):</label>
                <input type="url" id="fileUrl" placeholder="https://drive.google.com/...">
            </div>

            <div class="form-group" id="fileField" style="display: none;">
                <label for="fileInput">কম্পিউটার/মোবাইল থেকে ফাইল সিলেক্ট করুন:</label>
                <input type="file" id="fileInput">
            </div>

            <button type="submit" class="btn-submit">Add to List</button>
        </form>
    </div>

    <div class="user-panel">
        <h2>Available Book List</h2>
        <div class="book-list" id="bookContainer"></div>
    </div>
</div>

<div id="viewerModal" class="viewer-modal">
    <div class="viewer-content">
        <div class="viewer-header">
            <h3 id="viewerTitle">Book Viewer</h3>
            <button class="btn-close-viewer" onclick="closeBook()">Close</button>
        </div>
        <div class="viewer-body" id="viewerBody" oncontextmenu="return false;"></div>
    </div>
</div>

<script>
    const bookForm = document.getElementById('bookForm');
    const bookContainer = document.getElementById('bookContainer');
    const adminPanel = document.getElementById('adminPanel');
    const uploadType = document.getElementById('uploadType');
    const linkField = document.getElementById('linkField');
    const fileField = document.getElementById('fileField');
    const viewerModal = document.getElementById('viewerModal');
    const viewerBody = document.getElementById('viewerBody');
    const viewerTitle = document.getElementById('viewerTitle');

    let books = [];
    let isAdmin = false;
    let db;

    // ১. IndexedDB ডেটাবেস সেটআপ (বড় ফাইল মেমরি লিমিট সমস্যার সমাধান)
    const request = indexedDB.open("SecureBookStorageDB", 1);
    
    request.onupgradeneeded = function(e) {
        db = e.target.result;
        if (!db.objectStoreNames.contains("books")) {
            db.createObjectStore("books", { keyPath: "id", autoIncrement: true });
        }
    };

    request.onsuccess = function(e) {
        db = e.target.result;
        loadBooks();
    };

    request.onerror = function() {
        alert("সিস্টেমের ডেটাবেস লোড করা সম্ভব হচ্ছে না।");
    };

    // সিকিউরিটি গার্ড
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === 's' || e.key === 'p' || e.key === 'S' || e.key === 'P')) {
            e.preventDefault();
            alert("সংরক্ষণ বা প্রিন্ট করা সম্পূর্ণ নিষিদ্ধ।");
        }
    });

    function toggleInputFields() {
        if (uploadType.value === 'link') {
            linkField.style.display = 'block';
            fileField.style.display = 'none';
            document.getElementById('fileInput').value = '';
        } else {
            linkField.style.display = 'none';
            fileField.style.display = 'block';
            document.getElementById('fileUrl').value = '';
        }
    }

    // ডেটাবেস থেকে সকল বই নিয়ে আসা
    function loadBooks() {
        const transaction = db.transaction(["books"], "readonly");
        const store = transaction.objectStore("books");
        const getAllRequest = store.getAll();

        getAllRequest.onsuccess = function() {
            books = getAllRequest.result;
            displayBooks();
        };
    }

    function displayBooks() {
        bookContainer.innerHTML = ''; 

        if (books.length === 0) {
            bookContainer.innerHTML = '<p class="no-books">কোনো বই বা ফাইল যুক্ত করা হয়নি।</p>';
            return;
        }

        books.forEach((book) => {
            const bookCard = document.createElement('div');
            bookCard.className = `book-card ${isAdmin ? 'admin-mode' : ''}`;
            
            const typeBadge = book.type === 'file' ? '📁 Local File' : '🔗 Web Link';
            const views = book.views || 0; // ভিউ কাউন্ট ডিফাইন না থাকলে ০ দেখাবে

            bookCard.innerHTML = `
                <button class="btn-delete" onclick="deleteBook(${book.id})">X</button>
                <h3>${book.title}</h3>
                <p>লেখক: ${book.author}</p>
                <span class="file-type-badge">${typeBadge}</span><br>
                <div class="view-count-badge">👀 মোট ভিউ: ${views} বার</div><br>
                <button onclick="openBook(${book.id})" class="btn-view">Read / View Book</button>
            `;
            bookContainer.appendChild(bookCard);
        });
    }

    // বই ওপেন করার সাথে সাথে ভিউ হিস্টোরি ১ বৃদ্ধি পাবে
    function openBook(id) {
        const transaction = db.transaction(["books"], "readwrite");
        const store = transaction.objectStore("books");
        const getRequest = store.get(id);

        getRequest.onsuccess = function() {
            const book = getRequest.result;
            
            // ভিউ সংখ্যা আপডেট করা হচ্ছে
            book.views = (book.views || 0) + 1;
            store.put(book);

            // পপআপ ভিউয়ারে কন্টেন্ট দেখানো
            viewerTitle.innerText = book.title + " - Read Only Mode";
            viewerBody.innerHTML = '';

            if(book.url.startsWith('data:image')) {
                viewerBody.innerHTML = `<img src="${book.url}" class="viewer-image" oncontextmenu="return false;" draggable="false">`;
            } else if(book.url.startsWith('data:application/pdf') || book.type === 'link') {
                let secureUrl = book.url;
                if(book.type === 'link' && secureUrl.includes('drive.google.com')) {
                    secureUrl = secureUrl.replace('/view', '/preview').replace('/edit', '/preview');
                }
                viewerBody.innerHTML = `<iframe src="${secureUrl}#toolbar=0&navpanes=0&scrollbar=0" width="100%" height="100%"></iframe>`;
            } else {
                viewerBody.innerHTML = `<iframe src="${book.url}" width="100%" height="100%"></iframe>`;
            }

            viewerModal.style.display = 'block';
            
            // ব্যাকগ্রাউন্ডের ডাটা রিয়েলটাইমে আপডেট করার জন্য
            loadBooks();
        };
    }

    function closeBook() {
        viewerBody.innerHTML = '';
        viewerModal.style.display = 'none';
    }

    // অ্যাডমিন হিডেন শর্টকাট (Ctrl + Shift + A)
    window.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.shiftKey && (e.key === 'A' || e.key === 'a')) {
            e.preventDefault();
            const adminId = prompt("Enter Admin ID:");
            if (adminId === "236533") {
                const adminPass = prompt("Enter Admin Password:");
                if (adminPass === "fahad236533") {
                    alert("অ্যাডমিন লগইন সফল হয়েছে!");
                    isAdmin = true;
                    adminPanel.style.display = 'block';
                    displayBooks();
                } else {
                    alert("ভুল পাসওয়ার্ড!");
                }
            } else if (adminId !== null) {
                alert("ভুল অ্যাডমিন আইডি!");
            }
        }
    });

    bookForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const title = document.getElementById('bookTitle').value;
        const author = document.getElementById('bookAuthor').value;
        const type = uploadType.value;

        if (type === 'link') {
            const url = document.getElementById('fileUrl').value;
            if(!url) return alert("দয়া করে লিংকটি প্রদান করুন।");
            saveBook({ title, author, type, url, views: 0 });
        } else {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert("দয়া করে একটি ফাইল সিলেক্ট করুন।");
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const url = event.target.result;
                saveBook({ title, author, type, url, views: 0 });
            };
            reader.readAsDataURL(file);
        }
    });

    function saveBook(bookObj) {
        const transaction = db.transaction(["books"], "readwrite");
        const store = transaction.objectStore("books");
        const addRequest = store.add(bookObj);

        addRequest.onsuccess = function() {
            bookForm.reset();
            toggleInputFields();
            loadBooks();
        };

        addRequest.onerror = function() {
            alert("ফাইল স্টোরেজ ওভারফ্লো করেছে অথবা কোনো ত্রুটি ঘটেছে।");
        };
    }

    function deleteBook(id) {
        if(confirm("আপনি কি এটি তালিকা থেকে বাদ দিতে চান?")) {
            const transaction = db.transaction(["books"], "readwrite");
            const store = transaction.objectStore("books");
            const deleteRequest = store.delete(id);

            deleteRequest.onsuccess = function() {
                loadBooks();
            };
        }
    }

    function logoutAdmin() {
        isAdmin = false;
        adminPanel.style.display = 'none';
        displayBooks();
        alert("অ্যাডমিন লগআউট করা হয়েছে।");
    }
</script>

</body>
</html>
